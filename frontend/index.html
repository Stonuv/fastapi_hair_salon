<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Статичные дефолты для самого первого рендера/краулера без JS —
         дальше настоящие значения из настроек сайта (Админка → SEO)
         применяются поверх через JS, см. src/theme/seo.js. id="site-favicon"
         совпадает с тем, что ищет applySeo(), чтобы не плодить вторую
         <link rel="icon">, а обновлять эту же. -->
    <title>Барбершоп «Сайтама»</title>
    <meta name="description" content="Барбершоп «Сайтама» — стрижки, оформление бороды и горячее бритьё. Запись онлайн с точностью до минуты." />
    <link id="site-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Yandex.Metrika counter (вынесен в /metrika.js — см. комментарий там) -->
    <script src="/metrika.js"></script>
    <!-- /Yandex.Metrika counter -->
  </head>
  <body>
    <!-- Yandex.Metrika noscript pixel -->
    <noscript><div><img src="https://mc.yandex.ru/watch/110627746" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
