[pytest]
markers =
    integration: requires a real Postgres database (see tests/integration/conftest.py)

# По умолчанию (bare `pytest`/`pytest -q`) интеграционные тесты не запускаются —
# им нужен реальный Postgres (TEST_DATABASE_URL), юнит-тесты его не требуют
# и должны остаться быстрыми и не требующими настройки. Явный запуск
# интеграционных тестов — `pytest -m integration tests/integration -q`
# (см. docstring tests/integration/conftest.py, почему путь важен).
addopts = -m "not integration"
