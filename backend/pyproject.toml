[tool.ruff]
# Только линт (см. ROADMAP.md Фаза 2) — ruff format в стиле Black
# переписал бы почти каждый файл: сломал бы ручное выравнивание колонок
# в config.py/моделях/схемах и по-другому перенёс многострочные импорты.
# Осознанное решение — не трогать устоявшийся визуальный стиль кодовой базы.

[tool.ruff.lint]
# E501 (длина строки) и I (сортировка импортов) исключены намеренно — тот
# же случай: строгая длина строки не совместима с длинными
# WHY-комментариями на русском, а автосортировка/реформат импортов
# конфликтует с ручным выравниванием многострочных import-групп,
# используемым по всему проекту.
select = ["E", "F", "B", "UP", "SIM", "C4"]
ignore = ["E501"]

[tool.ruff.lint.flake8-bugbear]
# Depends(...)/Query(...) и т.п. как default-значение — обязательная
# идиома FastAPI (Depends физически обязан быть вызван как default), не
# баг с mutable default argument, который правило B008 обычно ловит.
extend-immutable-calls = [
    "fastapi.Depends", "fastapi.Query", "fastapi.Body", "fastapi.Path",
    "fastapi.Header", "fastapi.Cookie", "fastapi.Form", "fastapi.File",
]
