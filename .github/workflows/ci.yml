name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      # Тесты — чистые unit-тесты без БД (сервисы вызываются напрямую,
      # с фейковыми репозиториями, см. tests/*.py) — ни Postgres, ни .env
      # тут не нужны, settings() падает на fail-fast только при DEBUG=false
      # (дефолт — true, когда переменные окружения не заданы).
      - run: pytest -q

      # PYSEC-2026-1325 (ecdsa) — единственное известное на сейчас исключение,
      # без доступного фикса апстрима. Не эксплуатируемо в этом приложении:
      # ecdsa — транзитивная зависимость python-jose для RSA/EC-алгоритмов,
      # а JWT здесь подписываются только HS256 (симметричный HMAC, settings.
      # algorithm в config.py — единственное используемое значение), код
      # ecdsa в рантайме не вызывается ни при каких условиях.
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2026-1325

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt
      # Только check, без format — см. pyproject.toml, почему ruff format
      # (Black-стиль) здесь осознанно не применяется.
      - run: ruff check app tests

  backend-integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Реальный Postgres — EXCLUDE USING gist (защита от двойного бронирования),
    # partial unique indexes (soft-delete освобождает email) и happy path
    # целиком через HTTP-стек — то, что юнит-тесты выше (фейковые репозитории)
    # не могут проверить в принципе. См. tests/integration/conftest.py.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: barbershop
          POSTGRES_PASSWORD: barbershop
          POSTGRES_DB: barbershop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U barbershop -d barbershop_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - run: pytest -m integration tests/integration -q
        env:
          TEST_DATABASE_URL: postgresql://barbershop:barbershop@localhost:5432/barbershop_test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      # Юнит-тесты (Vitest) — отдельная джоба frontend-unit-tests ниже.
      # Здесь только сборка — ловит синтаксические ошибки/битые импорты,
      # то же самое, что происходит при реальном docker compose build.
      - run: npm run build

      # continue-on-error: единственные текущие high/moderate-находки —
      # esbuild/vite (path traversal и т.п. в dev-сервере vite) — актуальны
      # только для `npm run dev`, не для собранной статики, которая реально
      # деплоится. Чистый фикс — мажорный апгрейд vite 5→8 (breaking change,
      # nужен отдельный проход с проверкой), не тянуть сюда попутно. Шаг
      # оставлен видимым (не убран совсем), чтобы не пропустить НОВую
      # high/critical-находку поверх уже известных — снять continue-on-error,
      # когда vite будет обновлён.
      - run: npm audit --audit-level=high
        continue-on-error: true

  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      # Стор/composable-уровень (Vitest) — pinia-сторы с замоканным API-слоем
      # и чистые утилиты. Компонентных/e2e-тестов тут нет, см. frontend-e2e.
      - run: npm run test:unit

  frontend-e2e:
    runs-on: ubuntu-latest
    # Playwright запускает всё из tests/e2e/ разом: core-flows.spec.js
    # (сквозные сценарии поверх настоящего backend + Postgres — ловят то,
    # что unit/integration-тесты в принципе не видят: реальные
    # HTTP-редиректы, race conditions между router-guard'ом и async
    # изменением стора и т.п.; именно так нашлись и были исправлены два
    # бага — SetupWizard не проставлял auth.ready, DashboardLayout/
    # AppHeader не дожидались auth.logout() перед редиректом на /login) и
    # pages-a11y.spec.js (регрессия доступности, axe-core, на нескольких
    # ключевых страницах — порядок файлов важен, см. его докстринг). См.
    # docstring frontend/tests/e2e/core-flows.spec.js.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: barbershop
          POSTGRES_PASSWORD: barbershop
          POSTGRES_DB: barbershop_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U barbershop -d barbershop_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: Migrate database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://barbershop:barbershop@localhost:5432/barbershop_e2e
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://barbershop:barbershop@localhost:5432/barbershop_e2e
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && exit 0
            sleep 1
          done
          echo "backend did not become healthy in time"; cat /tmp/backend.log; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npx playwright install --with-deps chromium
        working-directory: frontend

      - run: npx playwright test
        working-directory: frontend
        env:
          E2E_API_URL: http://127.0.0.1:8000/api

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      # Только eslint, без prettier --check — см. eslint.config.js, почему
      # полное автоформатирование здесь осознанно не форсируется.
      - run: npm run lint

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # SECRET_KEY/SETUP_TOKEN у backend — обязательные переменные
      # (${VAR:?...} в docker-compose.yml), в проде живут в .env (не в
      # git) — тут фиктивные значения, только чтобы проверить синтаксис
      # и интерполяцию самого docker-compose.yml, не для реального запуска.
      - name: Validate docker-compose.yml
        env:
          SECRET_KEY: ci-dummy-secret
          SETUP_TOKEN: ci-dummy-token
        run: docker compose --env-file /dev/null config --quiet
