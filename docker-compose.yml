# Продовая сборка всего стека: PostgreSQL + FastAPI + nginx со статикой SPA +
# Caddy как TLS-терминатор перед всем этим.
#
#   cp .env.example .env   # заполните SECRET_KEY/SETUP_TOKEN/POSTGRES_PASSWORD
#   docker compose up --build -d
#
# Без домена (SITE_ADDRESS не задан или ":80") Caddy отдаёт обычный HTTP на
# 80-м порту — так и работает первый деплой по голому IP. Как только домен
# указывает на VPS (A-запись), задайте SITE_ADDRESS=your-domain.ru в .env и
# перезапустите Caddy (docker compose up -d caddy) — сертификат Let's
# Encrypt получается автоматически, без правки Caddyfile.
#
# Приложение — http://<IP или домен>/, Swagger — /api/docs. Сразу после
# первого запуска зайдите на /setup и введите SETUP_TOKEN — это создаёт
# первого админа (см. README «Первичная настройка»).
#
# Ежедневный бэкап БД (backup-local) поднимается автоматически, без
# донастройки — см. README «Бэкапы БД» (там же — восстановление и
# необязательный второй бэкап в S3).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: barbershop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barbershop}
      POSTGRES_DB: barbershop
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbershop -d barbershop"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://barbershop:${POSTGRES_PASSWORD:-barbershop}@db:5432/barbershop
      # При DEBUG=false приложение откажется стартовать без своего SECRET_KEY/SETUP_TOKEN
      SECRET_KEY: ${SECRET_KEY:?Задайте SECRET_KEY (python -c "import secrets; print(secrets.token_urlsafe(48))")}
      SETUP_TOKEN: ${SETUP_TOKEN:?Задайте SETUP_TOKEN (python -c "import secrets; print(secrets.token_urlsafe(24))")}
      DEBUG: "false"
      # true только после того, как перед приложением реально встал Caddy с
      # настоящим доменом (см. SITE_ADDRESS) — на голом HTTP ломает cookie.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@saitama-barbershop.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Барбершоп «Сайтама»}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      VK_REDIRECT_URI: ${VK_REDIRECT_URI:-http://localhost/api/auth/vk/callback}
      # Явно, тем же значением, что дефолт в config.py — не для смены
      # поведения, а чтобы конфиг был виден в compose-файле, а не спрятан
      # в Python-коде. В этой топологии (Caddy -> frontend -> nginx
      # проксирует /api same-origin) браузерный CORS вообще не участвует;
      # если топология поменяется (например, API на отдельном поддомене) —
      # задать реальные origin'ы через .env, формат — JSON-массив строк.
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:5173","http://localhost:3000","http://127.0.0.1:5173","http://127.0.0.1:3000"]}'
      # Пусто -> мониторинг ошибок выключен целиком, sentry_sdk.init() не
      # вызывается (см. TODO у settings.sentry_dsn в backend/app/config.py).
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      # Загруженные фото мастеров/hero-картинка (см. utils/uploads.py) —
      # именованный volume, иначе файлы терялись бы при каждом пересоздании
      # контейнера (docker compose up --build).
      - uploads:/app/uploads
    healthcheck:
      # curl/wget нет в python:3.14-slim, но python есть всегда — используем
      # его же. start_period больше interval*retries: alembic upgrade head
      # накатывается перед uvicorn и может занять заметное время сам по себе.
      # 127.0.0.1, не localhost: в контейнерах, работающих от непривилегированного
      # пользователя (см. Dockerfile), entrypoint-скрипты образа не всегда
      # успевают/могут донастроить IPv6-листener (нет прав переписать
      # рутовый конфиг) — "localhost" резолвится в ::1 первым и получает
      # connection refused, хотя сервис реально слушает на IPv4. Проверено
      # вживую на этом же стеке.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      # Build ARG, не environment: — VITE_* запекается в бандл на этапе
      # `npm run build`, обычная env-переменная контейнера тут бесполезна
      # (см. Dockerfile). Смена DSN требует `docker compose up --build -d
      # frontend`, одного restart недостаточно.
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      # Admin API (:2019, localhost-only, всегда поднят вне зависимости от
      # SITE_ADDRESS/домена/HTTPS) — топологически-независимая проверка,
      # что сам процесс Caddy жив и отвечает.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      frontend:
        condition: service_healthy

  # ── Бэкапы ────────────────────────────────────────────────────────
  # Ежедневный pg_dump (сжатый .sql.gz) с ротацией — на диск VPS, в
  # ./backups рядом с docker-compose.yml (bind-mount, не именованный
  # volume: так бэкапы видны и забираются снаружи Docker, например rsync/
  # scp на другую машину — сам по себе локальный бэкап не защищает от
  # потери всего VPS/диска). Включён всегда, донастройки не требует.
  backup-local:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: barbershop
      POSTGRES_USER: barbershop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barbershop}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    depends_on:
      db:
        condition: service_healthy

  # Тот же дамп, но улетает в S3-совместимое хранилище — переживает потерю
  # самого VPS, локальный backup-local выше — нет. Выключен по умолчанию
  # (profile "s3-backup"): без заполненных S3_BACKUP_* в .env контейнер
  # просто падал бы на каждом запуске cron. Включить:
  #   1) заполнить S3_BACKUP_* в .env (см. .env.example)
  #   2) docker compose --profile s3-backup up -d
  backup-s3:
    image: eeshugerman/postgres-backup-s3:16
    restart: unless-stopped
    profiles: ["s3-backup"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_DATABASE: barbershop
      POSTGRES_USER: barbershop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barbershop}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
      S3_ENDPOINT: ${S3_BACKUP_ENDPOINT:-}
      S3_REGION: ${S3_BACKUP_REGION:-}
      S3_BUCKET: ${S3_BACKUP_BUCKET:-}
      S3_PREFIX: backups
      S3_ACCESS_KEY_ID: ${S3_BACKUP_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_BACKUP_SECRET_ACCESS_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
